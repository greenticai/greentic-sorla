roles:
- id: admin
  label: Admin
  description: Full access to bug SoR edge-case operations.
  grants:
  - records.*
  - agent_endpoints.*
- id: case_worker
  label: Case worker
  description: Create, update, archive, restore, and link bug cases and assets.
  grants:
  - records.bug_case.*
  - records.bug_asset.*
  - records.bug_assignment.create
  - records.bug_assignment.update
- id: approver
  label: Approver
  description: Approve or reject assignments and sensitive changes.
  grants:
  - agent_endpoints.approve_assignment
  - agent_endpoints.reject_assignment
- id: importer
  label: Importer
  description: Run bulk assignment import operations.
  grants:
  - agent_endpoints.bulk_import_assignments
