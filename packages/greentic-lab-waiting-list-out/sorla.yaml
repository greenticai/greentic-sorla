agent_endpoints:
- id: join_waiting_list
  title: join waiting list
  intent: Add a user to a specific lab's waiting list once by email, optionally using
    an invitation code, and automatically assign generated user and invitation codes.
    Returns the waiting_list_entry id, invitation code, current position, and current
    waiting list size.
  description: Add a user to a specific lab's waiting list once by email, optionally
    using an invitation code, and automatically assign generated user and invitation
    codes. Returns the waiting_list_entry id, invitation code, current position, and
    current waiting list size.
  inputs:
  - name: lab_id
    type: uuid
    required: true
  - name: email
    type: email
    required: true
  - name: name
    type: string
    required: true
  - name: invited_by_code
    type: string
    required: false
  outputs:
  - name: entry_id
    type: uuid
  - name: invitation_code
    type: string
  - name: position
    type: integer
  - name: number_in_waiting_list
    type: integer
  side_effects:
  - action.join_waiting_list
  execution:
    kind: record_mutation
    action: join_waiting_list
    idempotency: return_existing
    target: waiting_list_entries
    constraints:
      idempotency:
        mode: return_existing
        index: waiting_list_entry_lab_email_unique
        fields:
        - lab_id
        - email
      unique:
      - index: waiting_list_entry_lab_email_unique
        record: waiting_list_entry
        kind: composite
        fields:
        - lab_id
        - email
      - index: waiting_list_entry_lab_invitation_code_unique
        record: waiting_list_entry
        kind: composite
        fields:
        - lab_id
        - invitation_code
    steps:
    - op: find_one
      as: referrer
      entity: waiting_list_entry
      collection: waiting_list_entries
      where:
        lab_id: $input.lab_id
        invitation_code: $input.invited_by_code
      required: true
      when:
        present: $input.invited_by_code
    - op: create
      as: entry
      entity: waiting_list_entry
      collection: waiting_list_entries
      input:
        email: $input.email
        entry_id: $generated.entry_id
        invitation_code: $generated.invitation_code
        invited_by_code: $input.invited_by_code
        joined_at: $now
        lab_id: $input.lab_id
        name: $input.name
        referred_count: 0
        referrer_entry_id: $steps.referrer.data.entry_id
        user_id: $generated.uuid
    - op: increment_where
      as: referrer_increment
      entity: waiting_list_entry
      collection: waiting_list_entries
      where:
        lab_id: $input.lab_id
        invitation_code: $input.invited_by_code
      increments:
        referred_count: 1
      when:
        all:
        - present: $input.invited_by_code
        - equals:
          - $steps.entry.created
          - true
    - op: query
      as: waiting_list
      entity: waiting_list_entry
      collection: waiting_list_entries
      where:
        lab_id: $input.lab_id
      order_by:
      - field: referred_count
        direction: desc
      - field: joined_at
        direction: asc
    return:
      entry_id: $steps.entry.record.data.entry_id
      invitation_code: $steps.entry.record.data.invitation_code
      number_in_waiting_list: $steps.waiting_list.count
      position: $steps.waiting_list.count
  risk: medium
  approval: policy-driven
  backing:
