name: Perf (lightweight)

on:
  schedule:
    # 04:51 UTC — staggered to avoid hot-spots. See plans/binary-bifurcation.md Phase A.4.
    - cron: "36 3 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
      - name: Run tests (including perf guards)
        run: cargo test --all --all-features
      - name: Run benchmarks (smoke)
        run: cargo bench -p greentic-sorla-cli --bench perf -- --sample-size 10
