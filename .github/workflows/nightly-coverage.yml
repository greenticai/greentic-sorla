name: Nightly Coverage

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  coverage:
    name: run-coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Install required binaries
        run: |
          cargo binstall -y --force cargo-llvm-cov
          cargo binstall -y --force cargo-nextest
          cargo binstall -y --force greentic-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run coverage and enforce policy
        run: |
          set -euo pipefail
          if ! command -v greentic-dev >/dev/null 2>&1; then
            echo "greentic-dev not found in PATH." >&2
            exit 1
          fi
          greentic-dev coverage
