name: Release

on:
  push:
    branches: [main, develop, research]
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to (re)publish. Required.'
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.diff.outputs.should_publish }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Diff version in describe.json
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          # NOTE: greentic-sorla-designer-extension's Cargo.toml uses
          # `version.workspace = true` (workspace-inherited from the
          # repo-root Cargo.toml), so it has no crate-local version to
          # diff — the workspace version tracks the whole greentic-sorla
          # workspace, not this extension. The extension's own version is
          # tracked independently in describe.json's metadata.version, so
          # that's what we diff here.
          MANIFEST=crates/greentic-sorla-designer-extension/describe.json

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          extract_version() {
            git show "$1:${MANIFEST}" 2>/dev/null \
              | jq -r '.metadata.version // empty' 2>/dev/null || echo ""
          }
          NEW=$(extract_version HEAD)
          OLD=$(extract_version HEAD~1)
          echo "  HEAD~1 version: ${OLD:-<none>}"
          echo "  HEAD   version: ${NEW:-<none>}"

          if [ -z "$NEW" ] || [ "$NEW" = "$OLD" ]; then
            echo "==> No version bump — skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Per-branch version-suffix policy: research -> -research, develop -> -dev, main -> stable.
          case "${GITHUB_REF_NAME}" in
            research)
              if [[ ! "$NEW" =~ -research(\.[0-9A-Za-z-]+)*$ ]]; then
                echo "::error::research expects a -research version; got $NEW"; exit 1
              fi ;;
            develop)
              if [[ ! "$NEW" =~ -dev(\.[0-9A-Za-z-]+)*$ ]]; then
                echo "::error::develop expects a -dev version; got $NEW"; exit 1
              fi ;;
            main)
              if [[ "$NEW" =~ - ]]; then
                echo "::error::main expects a stable version (no prerelease suffix); got $NEW"; exit 1
              fi ;;
          esac

          echo "==> Publishing ${NEW}"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

  ci:
    name: CI gate
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    # This repo's local .github/workflows/ci.yml has no `workflow_call`
    # trigger (it only runs on push/pull_request), so it can't be reused
    # via `uses: ./.github/workflows/ci.yml`. It delegates its own `ci`
    # job to this same org-level reusable workflow, so we call it
    # directly here to get an equivalent gate.
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host
    secrets: inherit

  publish:
    name: Publish .gtxpack to Greentic Store
    needs: [detect, ci]
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: greenticai/greentic-designer-extension-action@v2
        with:
          gtdx-version: "=1.3.0-research.1"
          manifest: crates/greentic-sorla-designer-extension/Cargo.toml
          store-url: https://store.greentic.cloud
          store-token: ${{ secrets.GREENTIC_STORE_TOKEN }}
          version: ${{ needs.detect.outputs.version }}
