name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host

  # ci/local_check.sh validates publishable-crate metadata, runs
  # cargo doc --no-deps, and performs package/publish dry-runs for
  # every publishable crate in the workspace. pr-ci.yml covers
  # fmt/clippy/test, so this sibling exists for the publish dry-run
  # validation that pr-ci.yml can't do. The fmt/clippy/test duplication
  # from local_check.sh is accepted overhead until local_check.sh is
  # refactored into separate scripts (out of this PR's scope).
  package-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify publishable packages
        run: bash ci/local_check.sh
