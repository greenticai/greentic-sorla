ontology:
  schema: greentic.sorla.ontology.v1
  concepts:
    - id: Party
      i18n_key: examples.ontology_business_sor.ontology.concepts.party
      kind: abstract
      description: "A business actor."
    - id: Customer
      i18n_key: examples.ontology_business_sor.ontology.concepts.customer
      kind: entity
      extends:
        - Party
      backed_by:
        record: Customer
      sensitivity:
        classification: confidential
        pii: true
    - id: Supplier
      i18n_key: examples.ontology_business_sor.ontology.concepts.supplier
      kind: entity
      extends:
        - Party
      backed_by:
        record: Supplier
    - id: Contract
      i18n_key: examples.ontology_business_sor.ontology.concepts.contract
      kind: entity
      backed_by:
        record: Contract
    - id: Asset
      i18n_key: examples.ontology_business_sor.ontology.concepts.asset
      kind: entity
      backed_by:
        record: Asset
    - id: Obligation
      i18n_key: examples.ontology_business_sor.ontology.concepts.obligation
      kind: entity
      backed_by:
        record: Obligation
      policy_hooks:
        - policy: obligation_risk_policy
          reason: "risk assessment requires policy review"
    - id: EvidenceDocument
      i18n_key: examples.ontology_business_sor.ontology.concepts.evidencedocument
      kind: entity
      backed_by:
        record: EvidenceDocument
  relationships:
    - id: has_contract
      i18n_key: examples.ontology_business_sor.ontology.relationships.has_contract
      label: "has contract"
      from: Customer
      to: Contract
      cardinality:
        from: one
        to: many
      backed_by:
        record: CustomerContract
        from_field: customer_id
        to_field: contract_id
    - id: fulfills_obligation
      i18n_key: examples.ontology_business_sor.ontology.relationships.fulfills_obligation
      label: "fulfills obligation"
      from: Supplier
      to: Obligation
      cardinality:
        from: one
        to: many
      backed_by:
        record: SupplierObligation
        from_field: supplier_id
        to_field: obligation_id
    - id: governs
      i18n_key: examples.ontology_business_sor.ontology.relationships.governs
      label: governs
      from: Contract
      to: Asset
      cardinality:
        from: one
        to: many
      backed_by:
        record: Asset
        from_field: contract_id
        to_field: id
    - id: supports
      i18n_key: examples.ontology_business_sor.ontology.relationships.supports
      label: supports
      from: EvidenceDocument
      to: Contract
      cardinality:
        from: many
        to: one
      backed_by:
        record: EvidenceDocument
        from_field: id
        to_field: contract_id
  constraints:
    - id: obligation_risk_policy
      applies_to:
        concept: Obligation
      requires_policy: obligation_risk_policy
semantic_aliases:
  concepts:
    Customer:
      - account
      - client
    EvidenceDocument:
      - evidence
      - "supporting document"
    Supplier:
      - vendor
  relationships:
    has_contract:
      - "covered by"
    supports:
      - substantiates
entity_linking:
  strategies:
    - id: customer_email_match
      applies_to: Customer
      match:
        source_field: email
        target_field: email
      confidence: 0.95
      sensitivity:
        pii: true
    - id: evidence_document_ref_match
      applies_to: EvidenceDocument
      match:
        source_field: document_ref
        target_field: document_ref
      confidence: 0.9
retrieval_bindings:
  schema: greentic.sorla.retrieval-bindings.v1
  providers:
    - id: evidence_index
      category: evidence-store
      required_capabilities:
        - evidence.query
        - entity.link
  scopes:
    - id: customer_contract_evidence
      applies_to:
        concept: Customer
      provider: evidence_index
      filters:
        entity_scope:
          include_self: true
          include_related:
            - relationship: has_contract
              direction: outgoing
              max_depth: 1
            - relationship: supports
              direction: incoming
              max_depth: 2
      permission: requires-policy
    - id: contract_support_documents
      applies_to:
        relationship: supports
      provider: evidence_index
      permission: inherit
actions:
