# --- BEGIN GREENTIC-SORLA GENERATED ---
package:
  name: landlord-tenant-sor
  version: 0.1.0
  i18n_key: examples.landlord_tenant_sor.package
roles:
  - id: admin
    i18n_key: examples.landlord_tenant_sor.roles.admin
    label: Admin
    description: "Full administrative access to landlord, building, unit, tenancy, payment, and maintenance records."
    grants:
      - "records.landlord.*"
      - "records.building.*"
      - "records.unit.*"
      - "records.tenant.*"
      - "records.tenancy.*"
      - "records.payment.*"
      - "records.maintenance_request.*"
      - "agent_endpoints.admin.*"
  - id: maintenance
    i18n_key: examples.landlord_tenant_sor.roles.maintenance
    label: Maintenance
    description: "Handle maintenance request intake and lifecycle updates."
    grants:
      - records.building.read
      - records.unit.read
      - records.maintenance_request.read
      - records.maintenance_request.create
      - records.maintenance_request.update
  - id: finance
    i18n_key: examples.landlord_tenant_sor.roles.finance
    label: Finance
    description: "Record and update tenancy payments."
    grants:
      - records.tenancy.read
      - records.payment.read
      - records.payment.create
      - records.payment.update
  - id: operations
    i18n_key: examples.landlord_tenant_sor.roles.operations
    label: Operations
    description: "Manage tenants and tenancy contracts."
    grants:
      - records.landlord.read
      - records.building.read
      - records.unit.read
      - records.tenant.read
      - records.tenant.create
      - records.tenant.update
      - records.tenancy.read
      - records.tenancy.create
      - records.tenancy.update
