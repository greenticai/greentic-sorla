ontology:
  schema: greentic.sorla.ontology.v1
  concepts:
    - id: Party
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.party
      kind: abstract
      description: "A legal or natural actor in the domain."
    - id: Landlord
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.landlord
      kind: entity
      extends:
        - Party
      backed_by:
        record: Landlord
      sensitivity:
        classification: confidential
        pii: true
    - id: Tenant
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.tenant
      kind: entity
      extends:
        - Party
      backed_by:
        record: Tenant
      sensitivity:
        classification: confidential
        pii: true
    - id: Building
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.building
      kind: entity
      backed_by:
        record: Building
    - id: Unit
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.unit
      kind: entity
      backed_by:
        record: Unit
    - id: Tenancy
      i18n_key: examples.landlord_tenant_sor.ontology.concepts.tenancy
      kind: entity
      backed_by:
        record: Tenancy
  relationships:
    - id: owns
      i18n_key: examples.landlord_tenant_sor.ontology.relationships.owns
      label: owns
      from: Landlord
      to: Building
      cardinality:
        from: one
        to: many
      backed_by:
        record: Building
        from_field: landlord_id
        to_field: id
    - id: contains
      i18n_key: examples.landlord_tenant_sor.ontology.relationships.contains
      label: contains
      from: Building
      to: Unit
      cardinality:
        from: one
        to: many
      backed_by:
        record: Unit
        from_field: building_id
        to_field: id
    - id: occupies
      i18n_key: examples.landlord_tenant_sor.ontology.relationships.occupies
      label: occupies
      from: Tenant
      to: Unit
      cardinality:
        from: many
        to: one
      backed_by:
        record: Tenancy
        from_field: tenant_id
        to_field: unit_id
  constraints:
    - id: tenant_data_policy
      applies_to:
        concept: Tenant
      requires_policy: TenancyWritePolicy
semantic_aliases:
  concepts:
    Building:
      - property
      - "rental building"
    Landlord:
      - owner
      - "property owner"
    Tenancy:
      - lease
      - "rental agreement"
    Tenant:
      - occupant
      - renter
  relationships:
    contains:
      - "has unit"
      - "includes unit"
    occupies:
      - "lives in"
      - rents
    owns:
      - "belongs to"
      - "owned by"
entity_linking:
  strategies:
    - id: tenant_email_match
      applies_to: Tenant
      match:
        source_field: email
        target_field: email
      confidence: 0.95
      sensitivity:
        classification: confidential
        pii: true
    - id: unit_id_match
      applies_to: Unit
      match:
        source_field: unit_id
        target_field: id
      confidence: 1.0
