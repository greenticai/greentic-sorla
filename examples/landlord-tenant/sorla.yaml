record_hierarchy:
  Building:
    parent: Landlord
    field: landlord_id
  Landlord:
    main: true
  MaintenanceRequest:
    parent: Unit
    field: unit_id
  Payment:
    parent: Tenancy
    field: tenancy_id
  Tenancy:
    parent: Tenant
    field: tenant_id
  Tenant:
    main: true
  Unit:
    parent: Building
    field: building_id
metrics:
  - name: active_tenancies
    i18n_key: examples.landlord_tenant_sor.metrics.active_tenancies
    label: "Active Tenancies"
    source:
      kind: record
      name: Tenancy
    measure:
      aggregate: count
    filters:
      - field: status
        operator: equals
        value: active
    dimensions:
      - building_id
    depends_on: []
  - name: monthly_tenancy_revenue
    i18n_key: examples.landlord_tenant_sor.metrics.monthly_tenancy_revenue
    label: "Monthly Tenancy Revenue"
    source:
      kind: record
      name: Payment
    measure:
      aggregate: sum
      field: amount
    filters:
      - field: status
        operator: equals
        value: settled
    time:
      field: paid_on
      grain: month
    unit: EUR
    dimensions:
      - tenancy_id
    depends_on: []
  - name: occupancy_rate
    i18n_key: examples.landlord_tenant_sor.metrics.occupancy_rate
    label: "Occupancy Rate"
    unit: percent
    dimensions:
      - building_id
    formula: "active_tenancies / total_units"
    depends_on:
      - active_tenancies
      - total_units
  - name: open_maintenance_records_per_building
    i18n_key: examples.landlord_tenant_sor.metrics.open_maintenance_records_per_building
    label: "Open Maintenance Records per Building"
    source:
      kind: record
      name: MaintenanceRequest
    measure:
      aggregate: count
    filters:
      - field: status
        operator: equals
        value: open
    dimensions:
      - building_id
    depends_on: []
  - name: total_tenants
    i18n_key: examples.landlord_tenant_sor.metrics.total_tenants
    label: "Total Tenants"
    source:
      kind: record
      name: Tenant
    measure:
      aggregate: count
    dimensions: []
    depends_on: []
  - name: total_units
    i18n_key: examples.landlord_tenant_sor.metrics.total_units
    label: "Total Units"
    source:
      kind: record
      name: Unit
    measure:
      aggregate: count
    dimensions:
      - building_id
    depends_on: []
provider_requirements:
  - category: storage
    capabilities:
      - event-log
      - projections
  - category: event-store
    capabilities:
      - append
      - read-stream
policies:
  - name: AdminRolePolicy
  - name: MaintenanceRolePolicy
  - name: FinanceRolePolicy
  - name: OperationsRolePolicy
  - name: TenancyWritePolicy
approvals:
  - name: AdminRecordApproval
  - name: LandlordRecordApproval
migrations:
  - name: landlord-tenant-sor-compatibility
    compatibility: additive
    projection_updates: []
agent_endpoints:
  - id: create_landlord
    i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_landlord
    title: "Create landlord"
    intent: "Admin-only creation of a landlord record."
    inputs:
      - name: full_name
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_landlord.inputs.full_name
        type: string
        required: true
      - name: email
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_landlord.inputs.email
        type: email
        required: true
        sensitive: true
    outputs:
      - name: landlord_id
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_landlord.outputs.landlord_id
        type: uuid
    side_effects:
      - event.LandlordCreated
    emits:
      event: LandlordCreated
      stream: landlord-tenant-sor/admin
      payload:
        email: "$input.email"
        full_name: "$input.full_name"
        id: "$generated.landlord_id"
    risk: medium
    approval: policy-driven
    backing:
      actions:
        - CreateLandlord
      events:
        - LandlordCreated
      policies:
        - AdminRolePolicy
      approvals:
        - AdminRecordApproval
    authorization:
      roles:
        any_of:
          - admin
        all_of: []
      policies:
        - AdminRolePolicy
    execution:
      kind: record-create
      record: Landlord
  - id: create_building
    i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_building
    title: "Create building"
    intent: "Admin-only creation of a building and association to a landlord."
    inputs:
      - name: landlord_id
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_building.inputs.landlord_id
        type: uuid
        required: true
      - name: address
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_building.inputs.address
        type: string
        required: true
    outputs:
      - name: building_id
        i18n_key: examples.landlord_tenant_sor.agent_endpoints.create_building.outputs.building_id
        type: uuid
    side_effects:
      - event.BuildingCreated
    emits:
      event: BuildingCreated
      stream: landlord-tenant-sor/{landlord_id}
      payload:
        address: "$input.address"
